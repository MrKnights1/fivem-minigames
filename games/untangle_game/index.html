<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Untangle</title>
    <meta name="viewport" content="width=device-width, initial-scale=0.4">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.2/css/solid.css" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="minigame.css">
    <script src="../shared/settings.js"></script>
    <script defer src="minigame.js"></script>
</head>
<body>
    <h1 class="title">Untangle Minigame</h1>
    <h3 class="description">
        Play the Untangle Minigame to test your spatial reasoning.
        <br><br>
        <u>How to play:</u> Drag the dots around until no lines cross each other.
    </h3>
    <div class="streaks">
        STREAK: <span class="streak">0</span> <span class="fa">&#xf21b;</span> MAX STREAK: <span class="max_streak">0</span>
        <br>TIME: <span class="time">0.000</span> <span class="fa">&#xf2f2;</span> BEST TIME: <span class="best_time">99.999</span>
    </div>
    <div class="options">
        <div class="option speed">
            <label for="speed">Speed:</label>
            <input id="speed" type="range" value="10" min="7" max="30" autocomplete="off">
            <div class="speed_value">10s</div>
        </div>
        <div class="option dots">
            <label for="dots">Dots:</label>
            <input id="dots" type="range" value="7" min="6" max="10" autocomplete="off">
            <div class="dots_value">7</div>
        </div>
    </div>
    <div class="options settings">
        <div class="option setting">
            <label><input id="showIntersections" type="checkbox"> Show Intersections</label>
        </div>
    </div>
    <div class="minigame">
        <div class="splash"><div class="fa hacker">&#xf21b;</div><span class="text">PREPARING INTERFACE...</span></div>
        <canvas class="untanglecanvas hidden" id="game-canvas" width="500" height="500"></canvas>
    </div>
    <div class="restart"><button class="btn_again">AGAIN!</button></div>
    <script>
        initSettings('untangle', ['#speed', '#dots', '#showIntersections']);
        document.querySelector('.speed_value').textContent = document.querySelector('#speed').value + 's';
        document.querySelector('.dots_value').textContent = document.querySelector('#dots').value;
    </script>
</body>
</html>
